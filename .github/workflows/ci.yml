name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Analyze, test, and enforce coverage
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: R2025b
          products: >-
            Statistics_and_Machine_Learning_Toolbox
            Optimization_Toolbox

      # Runs the buildfile default tasks: static analysis (zero-warning
      # gate), the full test suite, and the 80% statement-coverage gate.
      # The parallel-pool test skips itself when Parallel Computing
      # Toolbox is not installed.
      - name: Run buildtool (check, test, coverage)
        uses: matlab-actions/run-build@v2

      - name: Upload test and coverage results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: results/
